# Route fragment for the existing public server:
#   server_name 20.244.34.144;
#
# This file is intended to be included inside a server block, for example by:
#   include /etc/nginx/site-routes-enabled/*.conf;
#
# Assumes Docker publishes DBNotebook on:
#   127.0.0.1:7007 -> container:7860

location = /dbnotebook {
    return 301 /dbnotebook/;
}

location ^~ /dbnotebook/chat {
    rewrite ^/dbnotebook(/.*)$ $1 break;
    proxy_pass http://127.0.0.1:7007;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /dbnotebook;
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

location ^~ /dbnotebook/api/v2/chat/stream {
    rewrite ^/dbnotebook(/.*)$ $1 break;
    proxy_pass http://127.0.0.1:7007;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /dbnotebook;
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

location ^~ /dbnotebook/ {
    client_max_body_size 100M;

    rewrite ^/dbnotebook(/.*)$ $1 break;
    proxy_pass http://127.0.0.1:7007;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /dbnotebook;
    proxy_connect_timeout 120s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
}
