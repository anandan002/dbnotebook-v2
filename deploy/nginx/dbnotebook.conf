# DBNotebook reverse proxy for:
#   http://20.244.34.144/dbnotebook
#
# Assumes the Docker app is published on the host as:
#   127.0.0.1:7007 -> container:7860
#
# Install example:
#   sudo cp deploy/nginx/dbnotebook.conf /etc/nginx/sites-available/dbnotebook
#   sudo ln -s /etc/nginx/sites-available/dbnotebook /etc/nginx/sites-enabled/dbnotebook
#   sudo nginx -t
#   sudo systemctl reload nginx

server {
    listen 80;
    server_name 20.244.34.144;

    access_log /var/log/nginx/dbnotebook_access.log;
    error_log /var/log/nginx/dbnotebook_error.log;

    client_max_body_size 100M;

    # Canonicalize the subpath without a trailing slash.
    location = /dbnotebook {
        return 301 /dbnotebook/;
    }

    # Streaming chat/SSE endpoints. Keep buffering off for token streaming.
    location ^~ /dbnotebook/chat {
        rewrite ^/dbnotebook(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:7007;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /dbnotebook;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ^~ /dbnotebook/api/v2/chat/stream {
        rewrite ^/dbnotebook(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:7007;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /dbnotebook;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Main app, API, uploads, and built assets.
    location ^~ /dbnotebook/ {
        rewrite ^/dbnotebook(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:7007;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /dbnotebook;
        proxy_connect_timeout 120s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }
}
