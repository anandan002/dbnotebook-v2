# Model Configuration for RAG Chatbot
# This file controls which models appear in the UI dropdown
#
# Structure:
#   providers:
#     <provider_name>:
#       enabled: true/false          # Whether to show this provider's models
#       type: local/api              # "local" for Ollama, "api" for cloud providers
#       requires_api_key: true/false # Whether API key is required (for API providers)
#       env_key: "ENV_VAR_NAME"      # Environment variable name for API key
#       models:
#         - name: "model-name"       # Model identifier used in API calls
#           display_name: "Display"  # Optional: Human-readable name for UI
#           enabled: true/false      # Optional: Enable/disable individual models

providers:
  ollama:
    enabled: false
    type: local
    requires_api_key: false
    # Models are auto-detected from running Ollama server
    # You can optionally specify a whitelist to filter:
    models:
    - name: "llama3.1:latest"
    - name: "qwen2:7b"

  openai:
    enabled: true
    type: api
    requires_api_key: true
    env_key: "OPENAI_API_KEY"
    models:
      - name: "gpt-4.1-mini"
        display_name: "GPT-4.1 Mini"
      - name: "gpt-4.1"
        display_name: "GPT-4.1"
      - name: "gpt-4o"
        display_name: "GPT-4o"
      - name: "gpt-4o-mini"
        display_name: "GPT-4o Mini"
      - name: "gpt-4-turbo"
        display_name: "GPT-4 Turbo"
      - name: "gpt-4"
        display_name: "GPT-4"
      - name: "gpt-3.5-turbo"
        display_name: "GPT-3.5 Turbo"

  anthropic:
    enabled: true
    type: api
    requires_api_key: true
    env_key: "ANTHROPIC_API_KEY"
    models:
      - name: "claude-sonnet-4-20250514"
        display_name: "Claude Sonnet 4"
      - name: "claude-3-5-sonnet-20241022"
        display_name: "Claude 3.5 Sonnet"
      - name: "claude-3-5-haiku-20241022"
        display_name: "Claude 3.5 Haiku"
      - name: "claude-3-opus-20240229"
        display_name: "Claude 3 Opus"

  google:
    enabled: true
    type: api
    requires_api_key: true
    env_key: "GOOGLE_API_KEY"
    models:
      - name: "gemini-2.5-pro"
        display_name: "Gemini 2.5 Pro"
      - name: "gemini-2.5-flash"
        display_name: "Gemini 2.5 Flash"
      - name: "gemini-2.0-flash-exp"
        display_name: "Gemini 2.0 Flash"
      - name: "gemini-1.5-pro"
        display_name: "Gemini 1.5 Pro"
      - name: "gemini-1.5-flash"
        display_name: "Gemini 1.5 Flash"

  groq:
    enabled: true
    type: api
    requires_api_key: true
    env_key: "GROQ_API_KEY"
    models:
      - name: "openai/gpt-oss-120b"
        display_name: "GPT-OSS 120B"
        context_window: 128000
      - name: "openai/gpt-oss-20b"
        display_name: "GPT-OSS 20B"
        context_window: 128000
      - name: "meta-llama/llama-4-maverick-17b-128e-instruct"
        display_name: "Llama 4 Maverick"
        context_window: 128000
      - name: "meta-llama/llama-4-scout-17b-16e-instruct"
        display_name: "Llama 4 Scout"
        context_window: 128000
      - name: "llama-3.3-70b-versatile"
        display_name: "Llama 3.3 70B"
        context_window: 128000

# Default model to select on startup (optional)
default_model: "gpt-4.1-mini"
default_provider: "openai"

# ============================================
# Reranker Models
# ============================================
# Local models always available, Groq models available if GROQ_API_KEY is set.
rerankers:
  default: "base"

  # Local cross-encoder models
  local:
    - id: "xsmall"
      name: "XSmall"
      description: "Fastest (~22s CPU)"
    - id: "base"
      name: "Base"
      description: "Balanced (~30s CPU)"
    - id: "large"
      name: "Large"
      description: "Best local (~60s CPU)"

  # Groq rerankers. GPT-OSS models are not used for reranking because they
  # are incompatible with the structured JSON mode used by the reranker.
  groq:
    - id: "groq:scout"
      name: "Llama 4 Scout"
      description: "Fast (~300ms)"
    - id: "groq:maverick"
      name: "Llama 4 Maverick"
      description: "Better (~400ms)"
    - id: "groq:llama70b"
      name: "Llama 3.3 70B"
      description: "High quality (~600ms)"
